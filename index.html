
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guess Number Game</title>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</head>

<body>

<div class="container">
  <h1> Guess Number Game</h1>
  <p class="small">Guess a number between 1 - 100</p>

  <input type="number" id="inp-num" placeholder="Enter your guess">

  <button id="btn" onclick="check()">Check</button>

  <p id="msg"></p>
  <p id="history">Guess History: None</p>
  <p id="best">Best Score: --</p>
</div>


</body>
</html>
